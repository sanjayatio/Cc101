<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Girls Frontline 2</title>
    <link rel="stylesheet" href="shared.css" />
    <style>
      html, body {
        height: 100%;
        padding: 0;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 16px 8px;
        background: #12122a;
        min-width: 90px;
        border-right: 1px solid #2a2a5a;
        flex-shrink: 0;
      }

      .sidebar a {
        display: block;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: #a0a0ff;
        font-size: 0.9rem;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .sidebar a:hover {
        background: #20205a;
        color: #ffffff;
      }

      iframe {
        flex: 1;
        border: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body class="layout">
    <nav class="sidebar">
      <a href="unit.html" target="content-frame">Unit</a>
      <a href="remold.html" target="content-frame">Remold</a>
      <a href="affection.html" target="content-frame">Affection</a>
    </nav>
    <div class="content">
      <iframe name="content-frame" src="remold.html"></iframe>
    </div>
  </body>
</html>
