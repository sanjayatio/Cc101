<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Girls Frontline 2</title>
    <link rel="stylesheet" href="css/_base.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body class="layout">
    <nav class="sidebar">
      <a href="unit.html" target="content-frame">Unit</a>
      <a href="remold.html" target="content-frame">Remold</a>
      <a href="affection.html" target="content-frame">Affection</a>
      <a href="task.html" target="content-frame">Task</a>
      <a href="doll.html" target="content-frame">Doll</a>
    </nav>
    <div class="content">
      <iframe name="content-frame" src="remold.html"></iframe>
    </div>
  </body>
  <script>
    const links = document.querySelectorAll('.sidebar a');

    function setActive(href) {
      links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === href));
    }

    links.forEach(a => a.addEventListener('click', () => setActive(a.getAttribute('href'))));

    // Highlight the link matching the iframe's initial src
    const iframe = document.querySelector('iframe[name="content-frame"]');
    setActive(iframe.getAttribute('src'));
  </script>
</html>
