<!DOCTYPE html>
<html lang="en">
<head>
  <title>Remoulding</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/_base.css" />
  <link rel="stylesheet" href="css/remold.css" />
  <script src="data/master_remold.js"></script>
  <script src="data/master_doll.js"></script>
  <!-- data source: append ?test to URL to load tests/web/data_remold.js instead -->
  <script>
    document.write('<script src="' +
      (location.search.includes('test') ? 'tests/web/' : 'data/') +
      'data_remold.js"><\/script>');
  </script>
</head>
<body>

<div class="controls">
  <div class="row-count">
    Showing <span class="count-badge" id="rowCount">–</span> rows
  </div>
  <div class="filter-group">
    <label>Usr:</label>
    <button class="filter-btn active" data-user="all">All</button>
    <button class="filter-btn" data-user="GM">GM</button>
    <button class="filter-btn" data-user="IB">IB</button>
    <button class="filter-btn" data-user="FB">FB</button>
  </div>
  <div class="filter-group">
    <label>Main:</label>
    <button class="color-btn active" data-col="main" data-color="all">All</button>
    <button class="color-btn" data-col="main" data-color="red">Red</button>
    <button class="color-btn" data-col="main" data-color="blue">Blue</button>
    <button class="color-btn" data-col="main" data-color="purple">Purple</button>
    <button class="color-btn" data-col="main" data-color="green">Green</button>
  </div>
  <div class="filter-group">
    <label>Sub:</label>
    <button class="color-btn active" data-col="sub" data-color="all">All</button>
    <button class="color-btn" data-col="sub" data-color="red">Red</button>
    <button class="color-btn" data-col="sub" data-color="blue">Blue</button>
    <button class="color-btn" data-col="sub" data-color="purple">Purple</button>
    <button class="color-btn" data-col="sub" data-color="green">Green</button>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveDataFile()">💾 Save</button>
  <span id="save-status"></span>
</div>

<div class="table-wrapper">
  <table id="skillTable">
    <thead>
      <tr>
        <th>Usr</th>
        <th>Tier</th>
        <th>Doll</th>
        <th>Main</th>
        <th>Sub</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script src="js/remold.js"></script>
</body>
</html>
