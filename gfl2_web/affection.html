<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doll Affection Table</title>
    <script src="data/master_affection.js"></script>
    <script src="data/data_affection.js"></script>
    <link rel="stylesheet" href="css/_base.css" />
    <link rel="stylesheet" href="css/affection.css" />
  </head>
  <body>
    <div class="controls">
      <div class="row-count">
        Showing <span class="count-badge" id="rowCount">–</span> rows
      </div>
      <div>
        <label>Min affection</label>
        <select id="affection-filter">
          <option value="-1">Any</option>
          <option value="0">0+</option>
          <option value="1">1+</option>
          <option value="2">2+</option>
          <option value="3">3+</option>
          <option value="4">4 only</option>
        </select>
      </div>
      <div>
        <label>Affiliation</label>
        <select id="affil-filter"></select>
      </div>
      <div class="owner-filter-group">
        <label>Show owners:</label>
        <div id="owner-buttons"></div>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveDataFile()">💾 Save</button>
      <span id="save-status"></span>
    </div>

    <div class="table-wrapper">
      <table id="main-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

<script src="js/affection.js"></script>
  </body>
</html>
